name: Dependency Submission

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  submit-dependencies:
    name: Submit Gradle Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: https://gradle.com/terms-of-service
          build-scan-terms-of-use-agree: 'yes'

      - name: Submit dependency graph
        id: dependency-submission
        continue-on-error: true
        uses: gradle/actions/dependency-submission@3f131e8634966bd73d06cc69884922b02e6faf92

      - name: Dependency graph disabled notice
        if: steps.dependency-submission.outcome == 'failure'
        run: |
          echo "::notice title=Dependency graph submission skipped::GitHub rejected the dependency snapshot. Enable Dependency graph in the repository Code security settings to publish Gradle dependency snapshots."
