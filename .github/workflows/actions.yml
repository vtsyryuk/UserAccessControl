name: GitHub Actions

on:
  push:
    branches: [ master, main ]
    paths:
      - '.github/workflows/**'
  pull_request:
    branches: [ master, main ]
    paths:
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: Validate Workflows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Lint GitHub Actions workflows
        uses: devops-actions/actionlint@v1
